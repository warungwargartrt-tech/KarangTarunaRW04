<form id="formKarangTaruna" class="space-y-4">
    <input type="text" name="Nama" placeholder="Nama" required class="border p-2 w-full">
    <input type="email" name="Email" placeholder="Email" required class="border p-2 w-full">
    <textarea name="Pesan" placeholder="Pesan" required class="border p-2 w-full"></textarea>
    <button type="submit" id="btnKirim" class="bg-blue-500 text-white p-2 w-full">Kirim</button>
</form>

<script>
  // PASTI-KAN URL DI BAWAH INI ADALAH URL DARI DEPLOYMENT TERBARU (LANGKAH 2)
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxkBZtDNjU7l51Zb5fasw5SQ9zA006bv_tgdVn5nLZaQmXntXjae256699p8vGa13E/exec'; 
  const form = document.getElementById('formKarangTaruna');

  form.addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('btnKirim').disabled = true;
    document.getElementById('btnKirim').innerText = "Mengirim...";

    // Menggunakan fetch dengan mode 'no-cors' jika terjadi masalah akses
    fetch(scriptURL, { 
        method: 'POST', 
        body: new FormData(form)
    })
    .then(response => {
        alert("Data Berhasil Terkirim!");
        form.reset();
        document.getElementById('btnKirim').disabled = false;
        document.getElementById('btnKirim').innerText = "Kirim";
    })
    .catch(error => {
        alert("Gagal mengirim! Error: " + error.message);
        document.getElementById('btnKirim').disabled = false;
        document.getElementById('btnKirim').innerText = "Kirim";
    });
  });
</script>
